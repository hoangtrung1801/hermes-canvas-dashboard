name: canvas-dashboard
version: 0.1.0
description: Send action batches to a user-managed Canvas Dashboard API.
author: local
type: general
entry_point: __init__.py
dependencies:
  - websocket-client
requires_env:
  - CANVAS_DASHBOARD_URL
  - CANVAS_DASHBOARD_CANVAS_ID
  - CANVAS_DASHBOARD_TIMEOUT_MS
